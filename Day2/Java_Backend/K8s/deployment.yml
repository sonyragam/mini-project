apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-backend
  template:
    metadata:
      labels:
        app: java-backend
    spec:
      containers:
      - name: java-backend
        image: sonyragam/java-backend-app:105-c9bd168
        ports:
        - containerPort: 9090
        imagePullPolicy: Always
